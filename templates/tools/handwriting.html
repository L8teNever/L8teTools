{% extends "base.html" %}

{% block title %}Handschrift{% endblock %}

{% block content %}
<div class="tool-page-container">
    <div class="page-header">
        <a href="{{ url_for('dashboard') }}"
            class="p-4 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors">
            <span class="material-icons-round text-2xl">arrow_back</span>
        </a>
        <h2 class="text-3xl font-bold text-gray-800 dark:text-gray-100">Handschrift</h2>
        <div class="flex-1"></div>
        <button onclick="resetAll()" class="m3-button m3-button-outline text-sm" title="Alle Buchstaben loeschen">
            <span class="material-icons-round">restart_alt</span>
            Zuruecksetzen
        </button>
    </div>

    <!-- Tab Navigation -->
    <div class="flex gap-2 mb-8">
        <button onclick="switchTab('draw')" id="tabDraw"
            class="m3-button m3-button-filled flex items-center gap-2">
            <span class="material-icons-round">draw</span>
            Buchstaben zeichnen
        </button>
        <button onclick="switchTab('convert')" id="tabConvert"
            class="m3-button m3-button-outline flex items-center gap-2">
            <span class="material-icons-round">text_fields</span>
            Text umwandeln
        </button>
    </div>

    <!-- TAB 1: Draw Letters -->
    <div id="panelDraw">
        <!-- Character Selector -->
        <div class="m3-card mb-6">
            <h3 class="text-lg font-bold mb-4">Zeichen auswaehlen</h3>
            <div class="flex flex-wrap gap-2" id="charSelector">
                <!-- Generated by JS -->
            </div>
        </div>

        <!-- Drawing Area -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="m3-card flex flex-col items-center">
                <div class="flex items-center justify-between w-full mb-4">
                    <h3 class="text-lg font-bold">Zeichne: <span id="currentCharLabel" class="text-[var(--m3-primary)]">A</span></h3>
                    <div class="flex gap-2">
                        <button onclick="clearCanvas()" class="m3-button m3-button-outline text-sm">
                            <span class="material-icons-round">cleaning_services</span>
                            Loeschen
                        </button>
                        <button onclick="saveCurrentChar()" class="m3-button m3-button-filled text-sm">
                            <span class="material-icons-round">save</span>
                            Speichern
                        </button>
                    </div>
                </div>

                <!-- Canvas Container -->
                <div class="relative w-full" style="max-width: 400px;">
                    <canvas id="drawCanvas" width="400" height="400"
                        class="w-full border-2 border-dashed border-[var(--m3-outline)] rounded-2xl cursor-crosshair bg-white"
                        style="touch-action: none; aspect-ratio: 1/1;">
                    </canvas>
                    <!-- Guide lines -->
                    <div class="absolute inset-0 pointer-events-none flex items-center justify-center opacity-10">
                        <span class="text-[200px] font-bold text-gray-500 select-none" id="canvasGuide">A</span>
                    </div>
                </div>

                <!-- Brush Controls -->
                <div class="flex items-center gap-4 mt-4 w-full" style="max-width: 400px;">
                    <label class="text-sm text-[var(--m3-on-surface-variant)]">Strichstaerke:</label>
                    <input type="range" min="2" max="20" value="6" id="brushSize" class="m3-slider flex-1"
                        oninput="updateBrushSize()">
                    <span id="brushSizeLabel" class="text-sm font-mono w-8 text-center">6</span>
                    <label class="text-sm text-[var(--m3-on-surface-variant)] ml-4">Farbe:</label>
                    <input type="color" value="#000000" id="brushColor" class="w-8 h-8 rounded cursor-pointer border-0">
                </div>
            </div>

            <!-- Saved Characters Preview -->
            <div class="m3-card">
                <h3 class="text-lg font-bold mb-4">Gespeicherte Zeichen <span id="savedCount" class="text-[var(--m3-on-surface-variant)] text-sm font-normal">(0/36)</span></h3>
                <div class="grid grid-cols-6 gap-2" id="savedCharsGrid">
                    <!-- Filled by JS -->
                </div>
                <p class="text-sm text-[var(--m3-on-surface-variant)] mt-4">
                    Klicke auf ein gespeichertes Zeichen, um es zu bearbeiten.
                </p>
            </div>
        </div>
    </div>

    <!-- TAB 2: Convert Text -->
    <div id="panelConvert" style="display: none;">
        <div class="grid grid-cols-1 gap-6">
            <div class="m3-card">
                <h3 class="text-lg font-bold mb-4">Text eingeben</h3>
                <textarea id="convertInput" rows="4"
                    class="m3-text-input w-full resize-none"
                    placeholder="Gib hier deinen Text ein..."></textarea>
                <div class="flex items-center gap-4 mt-4">
                    <button onclick="convertText()" class="m3-button m3-button-filled">
                        <span class="material-icons-round">brush</span>
                        In Handschrift umwandeln
                    </button>
                    <label class="text-sm text-[var(--m3-on-surface-variant)]">Groesse:</label>
                    <input type="range" min="20" max="100" value="50" id="charSize" class="m3-slider" style="width: 120px;">
                    <span id="charSizeLabel" class="text-sm font-mono">50px</span>
                    <label class="text-sm text-[var(--m3-on-surface-variant)] ml-2">Abstand:</label>
                    <input type="range" min="0" max="30" value="5" id="charSpacing" class="m3-slider" style="width: 100px;">
                    <span id="charSpacingLabel" class="text-sm font-mono">5px</span>
                </div>
            </div>

            <div class="m3-card" id="convertResultCard" style="display: none;">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-bold">Ergebnis</h3>
                    <button onclick="downloadResult()" class="m3-button m3-button-filled text-sm">
                        <span class="material-icons-round">download</span>
                        Als Bild speichern
                    </button>
                </div>
                <div class="p-6 rounded-xl bg-white overflow-x-auto" id="convertResult">
                    <!-- Rendered handwriting -->
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // -- State --
    const ALL_CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'.split('');
    let savedChars = {};
    let currentChar = 'A';
    let isDrawing = false;
    let lastX = 0, lastY = 0;

    // -- Canvas Setup --
    const canvas = document.getElementById('drawCanvas');
    const ctx = canvas.getContext('2d');

    function initCanvas() {
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.lineWidth = parseInt(document.getElementById('brushSize').value);
        ctx.strokeStyle = document.getElementById('brushColor').value;
    }

    function getCanvasPos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
            x: (clientX - rect.left) * scaleX,
            y: (clientY - rect.top) * scaleY
        };
    }

    canvas.addEventListener('mousedown', (e) => {
        isDrawing = true;
        const pos = getCanvasPos(e);
        lastX = pos.x;
        lastY = pos.y;
    });

    canvas.addEventListener('mousemove', (e) => {
        if (!isDrawing) return;
        const pos = getCanvasPos(e);
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        lastX = pos.x;
        lastY = pos.y;
    });

    canvas.addEventListener('mouseup', () => isDrawing = false);
    canvas.addEventListener('mouseleave', () => isDrawing = false);

    // Touch support
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        isDrawing = true;
        const pos = getCanvasPos(e);
        lastX = pos.x;
        lastY = pos.y;
    });

    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (!isDrawing) return;
        const pos = getCanvasPos(e);
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        lastX = pos.x;
        lastY = pos.y;
    });

    canvas.addEventListener('touchend', () => isDrawing = false);

    // -- Brush --
    function updateBrushSize() {
        const val = document.getElementById('brushSize').value;
        document.getElementById('brushSizeLabel').textContent = val;
        ctx.lineWidth = parseInt(val);
    }

    document.getElementById('brushColor').addEventListener('input', (e) => {
        ctx.strokeStyle = e.target.value;
    });

    document.getElementById('charSize').addEventListener('input', (e) => {
        document.getElementById('charSizeLabel').textContent = e.target.value + 'px';
    });

    document.getElementById('charSpacing').addEventListener('input', (e) => {
        document.getElementById('charSpacingLabel').textContent = e.target.value + 'px';
    });

    // -- Character Selector --
    function buildCharSelector() {
        const container = document.getElementById('charSelector');
        container.innerHTML = '';
        ALL_CHARS.forEach(ch => {
            const btn = document.createElement('button');
            btn.className = 'w-10 h-10 rounded-xl font-bold text-sm flex items-center justify-center transition-all duration-200 ';
            btn.textContent = ch;
            btn.dataset.char = ch;
            btn.onclick = () => selectChar(ch);
            container.appendChild(btn);
        });
        updateCharSelectorStyles();
    }

    function updateCharSelectorStyles() {
        document.querySelectorAll('#charSelector button').forEach(btn => {
            const ch = btn.dataset.char;
            const isCurrent = ch === currentChar;
            const isSaved = savedChars[ch];

            btn.className = 'w-10 h-10 rounded-xl font-bold text-sm flex items-center justify-center transition-all duration-200 ';

            if (isCurrent) {
                btn.className += 'bg-[var(--m3-primary)] text-[var(--m3-on-primary)] scale-110 shadow-lg';
            } else if (isSaved) {
                btn.className += 'bg-[var(--m3-primary-container)] text-[var(--m3-on-primary-container)]';
            } else {
                btn.className += 'bg-[var(--m3-surface-container)] text-[var(--m3-on-surface)] hover:bg-[var(--m3-surface-container-high)]';
            }
        });
    }

    function selectChar(ch) {
        currentChar = ch;
        document.getElementById('currentCharLabel').textContent = ch;
        document.getElementById('canvasGuide').textContent = ch;
        clearCanvas();

        // If we have a saved version, load it onto canvas
        if (savedChars[ch]) {
            const img = new Image();
            img.onload = () => {
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            };
            img.src = savedChars[ch];
        }

        updateCharSelectorStyles();
    }

    // -- Canvas Operations --
    function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function isCanvasEmpty() {
        const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        for (let i = 3; i < data.length; i += 4) {
            if (data[i] > 0) return false;
        }
        return true;
    }

    async function saveCurrentChar() {
        if (isCanvasEmpty()) {
            showToast('Bitte zuerst den Buchstaben zeichnen.');
            return;
        }

        const imageData = canvas.toDataURL('image/png');

        try {
            const res = await fetch('/api/handwriting/save-letter', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({character: currentChar, image_data: imageData})
            });

            const result = await res.json();
            if (result.success) {
                savedChars[currentChar] = imageData;
                updateCharSelectorStyles();
                renderSavedGrid();
                showToast('"' + currentChar + '" gespeichert!');

                // Auto-advance to next unsaved character
                const nextUnsaved = ALL_CHARS.find(ch => !savedChars[ch] && ch !== currentChar);
                if (nextUnsaved) {
                    selectChar(nextUnsaved);
                }
            } else {
                showToast(result.error || 'Fehler beim Speichern');
            }
        } catch (e) {
            showToast('Fehler beim Speichern');
        }
    }

    // -- Saved Characters Grid --
    function renderSavedGrid() {
        const grid = document.getElementById('savedCharsGrid');
        grid.innerHTML = '';

        ALL_CHARS.forEach(ch => {
            const cell = document.createElement('div');
            cell.className = 'aspect-square rounded-xl border-2 flex items-center justify-center cursor-pointer transition-all duration-200 overflow-hidden relative group ';

            if (savedChars[ch]) {
                cell.className += 'border-[var(--m3-primary)] bg-white';
                const img = document.createElement('img');
                img.src = savedChars[ch];
                img.className = 'w-full h-full object-contain';
                img.alt = ch;
                cell.appendChild(img);

                // Overlay with character label
                const overlay = document.createElement('div');
                overlay.className = 'absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center';
                overlay.innerHTML = '<span class="text-white font-bold text-lg">' + ch + '</span>';
                cell.appendChild(overlay);
            } else {
                cell.className += 'border-dashed border-[var(--m3-outline)] bg-[var(--m3-surface-container)]';
                const label = document.createElement('span');
                label.className = 'text-sm text-[var(--m3-on-surface-variant)] opacity-50';
                label.textContent = ch;
                cell.appendChild(label);
            }

            cell.onclick = () => selectChar(ch);
            grid.appendChild(cell);
        });

        const count = Object.keys(savedChars).length;
        document.getElementById('savedCount').textContent = '(' + count + '/' + ALL_CHARS.length + ')';
    }

    // -- Tab Switching --
    function switchTab(tab) {
        document.getElementById('panelDraw').style.display = tab === 'draw' ? '' : 'none';
        document.getElementById('panelConvert').style.display = tab === 'convert' ? '' : 'none';

        document.getElementById('tabDraw').className = tab === 'draw'
            ? 'm3-button m3-button-filled flex items-center gap-2'
            : 'm3-button m3-button-outline flex items-center gap-2';
        document.getElementById('tabConvert').className = tab === 'convert'
            ? 'm3-button m3-button-filled flex items-center gap-2'
            : 'm3-button m3-button-outline flex items-center gap-2';
    }

    // -- Text Conversion --
    async function convertText() {
        const text = document.getElementById('convertInput').value.trim();
        if (!text) {
            showToast('Bitte Text eingeben.');
            return;
        }

        try {
            const res = await fetch('/api/handwriting/convert', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text: text})
            });

            const result = await res.json();
            if (result.error) {
                showToast(result.error);
                return;
            }

            renderHandwriting(result.text, result.char_map);
        } catch (e) {
            showToast('Fehler bei der Umwandlung');
        }
    }

    function renderHandwriting(text, charMap) {
        const container = document.getElementById('convertResult');
        const card = document.getElementById('convertResultCard');
        const charSize = parseInt(document.getElementById('charSize').value);
        const charSpacing = parseInt(document.getElementById('charSpacing').value);
        container.innerHTML = '';
        card.style.display = '';

        const lines = text.split('\n');

        lines.forEach(line => {
            const lineDiv = document.createElement('div');
            lineDiv.className = 'flex flex-wrap items-end';
            lineDiv.style.minHeight = charSize + 'px';
            lineDiv.style.marginBottom = '8px';

            for (const ch of line) {
                if (ch === ' ') {
                    const space = document.createElement('div');
                    space.style.width = (charSize * 0.5) + 'px';
                    space.style.height = charSize + 'px';
                    lineDiv.appendChild(space);
                    continue;
                }

                const upper = ch.toUpperCase();
                if (charMap[upper]) {
                    const img = document.createElement('img');
                    img.src = charMap[upper];
                    img.style.width = charSize + 'px';
                    img.style.height = charSize + 'px';
                    img.style.marginRight = charSpacing + 'px';
                    img.style.objectFit = 'contain';
                    img.className = 'inline-block';
                    lineDiv.appendChild(img);
                } else {
                    // Fallback: show character as text
                    const span = document.createElement('span');
                    span.textContent = ch;
                    span.style.width = charSize + 'px';
                    span.style.height = charSize + 'px';
                    span.style.lineHeight = charSize + 'px';
                    span.style.marginRight = charSpacing + 'px';
                    span.style.textAlign = 'center';
                    span.style.display = 'inline-block';
                    span.style.fontSize = (charSize * 0.7) + 'px';
                    span.style.color = '#aaa';
                    span.title = 'Zeichen "' + ch + '" nicht gezeichnet';
                    lineDiv.appendChild(span);
                }
            }

            container.appendChild(lineDiv);
        });
    }

    // -- Download Result as Image --
    async function downloadResult() {
        const container = document.getElementById('convertResult');
        if (!container.children.length) return;

        // Use a canvas to render the result
        const charSize = parseInt(document.getElementById('charSize').value);
        const charSpacing = parseInt(document.getElementById('charSpacing').value);
        const padding = 40;

        // Measure dimensions
        const lines = container.children;
        let maxWidth = 0;
        let totalHeight = padding * 2;

        for (const line of lines) {
            let lineWidth = 0;
            for (const el of line.children) {
                lineWidth += parseInt(el.style.width || charSize) + charSpacing;
            }
            maxWidth = Math.max(maxWidth, lineWidth);
            totalHeight += charSize + 8;
        }
        maxWidth += padding * 2;

        const renderCanvas = document.createElement('canvas');
        renderCanvas.width = Math.max(maxWidth, 200);
        renderCanvas.height = Math.max(totalHeight, 100);
        const rCtx = renderCanvas.getContext('2d');

        rCtx.fillStyle = '#ffffff';
        rCtx.fillRect(0, 0, renderCanvas.width, renderCanvas.height);

        let y = padding;

        // Load all images first
        const images = {};
        const text = document.getElementById('convertInput').value.trim().toUpperCase();
        const uniqueChars = [...new Set(text.replace(/[^A-Z0-9]/g, '').split(''))];

        await Promise.all(uniqueChars.map(ch => {
            return new Promise(resolve => {
                if (savedChars[ch]) {
                    const img = new Image();
                    img.onload = () => { images[ch] = img; resolve(); };
                    img.onerror = resolve;
                    img.src = savedChars[ch];
                } else {
                    resolve();
                }
            });
        }));

        // Render
        const inputText = document.getElementById('convertInput').value.trim().toUpperCase();
        const inputLines = inputText.split('\n');

        for (const line of inputLines) {
            let x = padding;
            for (const ch of line) {
                if (ch === ' ') {
                    x += charSize * 0.5 + charSpacing;
                    continue;
                }
                if (images[ch]) {
                    rCtx.drawImage(images[ch], x, y, charSize, charSize);
                } else {
                    rCtx.fillStyle = '#cccccc';
                    rCtx.font = (charSize * 0.7) + 'px sans-serif';
                    rCtx.textAlign = 'center';
                    rCtx.fillText(ch, x + charSize / 2, y + charSize * 0.75);
                }
                x += charSize + charSpacing;
            }
            y += charSize + 8;
        }

        const link = document.createElement('a');
        link.download = 'handschrift.png';
        link.href = renderCanvas.toDataURL('image/png');
        link.click();
        showToast('Bild heruntergeladen!');
    }

    // -- Reset All --
    async function resetAll() {
        if (!confirm('Alle gespeicherten Buchstaben loeschen?')) return;

        try {
            await fetch('/api/handwriting/reset', {method: 'POST'});
            savedChars = {};
            clearCanvas();
            renderSavedGrid();
            updateCharSelectorStyles();
            showToast('Alle Buchstaben geloescht.');
        } catch (e) {
            showToast('Fehler beim Zuruecksetzen');
        }
    }

    // -- Load saved chars on init --
    async function init() {
        initCanvas();
        buildCharSelector();

        try {
            const res = await fetch('/api/handwriting/letters');
            savedChars = await res.json();
        } catch (e) {
            savedChars = {};
        }

        renderSavedGrid();
        updateCharSelectorStyles();

        // Auto-select first unsaved character
        const firstUnsaved = ALL_CHARS.find(ch => !savedChars[ch]);
        if (firstUnsaved) selectChar(firstUnsaved);
    }

    init();
</script>
{% endblock %}
